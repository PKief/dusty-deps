name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

      - name: Type check
        run: tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
